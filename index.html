<!DOCTYPE html>
<html>
<head>
  <title>Spatial Desk</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0e0e0e;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 2000px;
      overflow: hidden;
    }

    .workspace {
      position: relative;
      width: 1300px;
      height: 850px;
      transform-style: preserve-3d;
    }

    .panel {
      position: absolute;
      border: 3px solid #1c1c1c;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
      background: black;
    }

    webview {
      width: 100%;
      height: 100%;
    }

    /* MAIN SCREEN */
.main {
  width: 800px;
  height: 450px;
  top: 120px;
  left: 250px;
  transform: translateZ(-300px) rotateX(5deg);
  transform-origin: center center;
}

/* LEFT SCREEN */
.left {
  width: 650px;
  height: 450px;
  top: 150px;
  left: -220px;
  transform: rotateY(70deg) translateZ(-120px);
  transform-origin: right center;
}

/* RIGHT SCREEN */
.right {
  width: 650px;
  height: 450px;
  top: 150px;
  right: -220px;
  transform: rotateY(-70deg) translateZ(-120px);
  transform-origin: left center;
}

/* BOTTOM SCREEN */
.bottom {
  width: 800px;
  height: 500px;
  bottom: -320px;
  left: 250px;
  transform: rotateX(70deg) translateZ(120px);
  transform-origin: top center;
}

  </style>
</head>

<body>

  <div class="workspace">

    <div class="panel main">
      <webview src="https://www.google.com"></webview>
    </div>

    <div class="panel left">
      <webview src="https://www.github.com"></webview>
    </div>

    <div class="panel right">
      <webview src="https://www.youtube.com"></webview>
    </div>

    <div class="panel bottom">
      <webview src="https://chat.openai.com"></webview>
    </div>

  </div>

</body>
</html>
