<!DOCTYPE html>
<html>
<head>
  <title>Spatial Desk</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #0e0e0e;
      display: flex;
      justify-content: center;
      align-items: center;
      perspective: 2000px;
      overflow: hidden;
    }

    .workspace {
      position: relative;
      width: 1300px;
      height: 850px;
      transform-style: preserve-3d;
    }

    .panel {
      position: absolute;
      border: 3px solid #1c1c1c;
    }

    webview {
      width: 100%;
      height: 100%;
    }

    /* MAIN — slightly forward, minimal tilt */
.main {
  width: 1290px;
  height: 500px;
  top: -35px;
  left: 50%;
  right: 0px;
  transform: translateX(-50%) translateZ(0px);
  position: absolute;
}

/* LEFT — hinge from right edge */
.left {
  width: 650px;
  height: 450px;
  top: 140px;
  left: -180px;
  transform-origin: right center;
  transform: rotateY(65deg) translateZ(-50px);
}

/* RIGHT — mirror of left */
.right {
  width: 650px;
  height: 450px;
  top: 140px;
  right: -180px;
  transform-origin: left center;
  transform: rotateY(-65deg) translateZ(-50px);
}

/* BOTTOM — hinge from top */
.bottom {
  width: 1300px;
  height: 700px;
  bottom: -300px;
  right: 50%;
  transform-origin: top center;
  position: absolute;
  transform: rotateX(65deg) translateZ(-30px);
  transform: translateX(50%) rotateX(65deg) translateZ(-30px);
}

  </style>
</head>

<body>

  <div class="workspace">
    <div class="panel main">
      <webview src="https://www.google.com"></webview>
    </div>
<!--
    <div class="panel left">
      <webview src="https://www.github.com"></webview>
    </div>

    <div class="panel right">
      <webview src="https://www.youtube.com"></webview>
    </div>
-->
    <div class="panel bottom">
      <webview src="https://chat.openai.com"></webview>
    </div>

  </div>

</body>
</html>
