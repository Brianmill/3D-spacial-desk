<!DOCTYPE html>
<html>
<head>
  <title>Spatial Desk</title>
  <style>
    body {
      margin: 0;
      display: flex;
      height: 100vh;
      background: #111;
    }

    .panel {
      flex: 1;
      border: 2px solid #333;
    }

    webview {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- LEFT PANEL -->
  <div class="panel">
    <webview src="https://www.google.com"></webview>
  </div>

  <!-- RIGHT PANEL -->
  <div class="panel">
    <webview src="https://www.github.com"></webview>
  </div>

</body>
</html>
